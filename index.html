<!DOCTYPE html>
<html>
    <head>
        <title>Congratulations🎉🎉</title>
        <style>
            body
            {
                font-family: Arial;
                background: linear-gradient(135deg,#ff919e,#fad0c4);
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0;
                overflow: hidden;
            }
            .card
            {
                background: white;
                padding: 25px;
                border-radius: 15px;
                text-align: center;
                width: 360px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.25);
                z-index: 2;
            }
            h1
            {
                color: #ff4d4d;
            }
            .slideshow
            {
                position: relative;
                width: 100%;
                height: 100%;
                object-fit: cover;
                opacity: 0;
                transform: scale(1);
                transition: opacity 1.5s, transform 4s;
            }
            .slideshow img.active
            {
                opacity: 1;
                transform: scale(1.1);
            }
            .confetti
            {
                position: absolute;
                width: 10px;
                height: 10px;
                background: red;
                top: -10px;
                animation: fall 4s linear infinite;
            }
            @keyframes fall
            {
                0%
                {
                    transform: translateY(0) rotate(0);
                }
                100%
                {
                    transform: translateY(100vh) rotate(720deg);
                }
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>🎊Congratulations!!!🎊</h1>
            <p id="message"></p>
            <div class="slideshow">
                <img src="photo1.jpeg" class="active">
                <img src="photo2.jpeg">
                <img src="photo3.jpeg">
                <img src="photo4.jpeg">
            </div>
        </div>
        <script>
            const params=new URLSearchParams(window.location.search)
            const name=params.get("name") || "Shreya";
            document.getElementById("message").innerText="Dear "+name+", Congratulations on your first bonus! I'm really happy and proud of you. It's truly well deserved after all the hard work and dedication you've put in. Achievements like this show how much your efforts are paying off, and it makes me so glad to see you succeed. I just wish I could have been there to celebrate this moment with you. But we'll definitely celebrate together when we meet soon. This is just the beginning of many more successes ahead. Wishing you continued growth, happiness, and success ❤️";
            let slides=document.querySelectorAll(".slideshow img");
            let index=0;
            setInterval(()=>
            {
                slides[index].classList.remove("active");
                index=(index+1)%slides.length;
                slides[index].classList.add("active");
            },3000);
            function createConfetti()
            {
                for(let i=0;i<120;i++)
                {
                    let confetti=document.createElement("div");
                    confetti.classList.add("confetti");
                    confetti.style.left=Math.random()*100+"vw";
                    confetti.style.background="hsla("+Math.random()*360+",100%,50%,1)";
                    confetti.style.animationDuration=(Math.random()*3+2)+"s";
                    document.body.appendChild(confetti);
                }
            }
            createConfetti();
        </script>
    </body>
</html>
