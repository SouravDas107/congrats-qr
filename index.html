<!DOCTYPE html>
<html>
<head>
<title>Congratulations 🎉🎉</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#ff919e,#fad0c4);
    margin:0;
    padding:0;
    overflow-x:hidden;
    display:flex;
    justify-content:center;
}

/* Card */
.card{
    position: relative;
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    width:360px;
    max-width:90vw;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    margin:50px 0;
    z-index:1;
}

/* Heading */
h1{
    color:#ff4d4d;
    font-size:1.5rem;
}

/* Message */
#message{
    font-size:1rem;
    margin-top:15px;
    word-wrap:break-word;
}

/* Slideshow */
.slideshow{
    width:100%;
    overflow:hidden;
    border-radius:10px;
    margin-top:15px;
}

.slideshow img{
    width:100%;
    height:auto;
    display:none;
}

.slideshow img.active{
    display:block;
}

/* Confetti */
.confetti{
    position: fixed; /* prevents extra scroll */
    width:10px;
    height:10px;
    top:0;
    pointer-events:none;
    z-index:2;
    animation-name:fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
}

@keyframes fall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(100vh) rotate(720deg); opacity:1; }
}

/* Hearts */
.heart{
    position: fixed; /* float over viewport */
    font-size:200px; /* 10x bigger */
    color:#ff4d6d;
    pointer-events:none;
    z-index:3;
    animation-name:floatUp;
    animation-timing-function: linear;
    animation-iteration-count: 1;
}

@keyframes floatUp{
    0%{ transform: translateY(100vh) scale(0.5); opacity:1; }
    100%{ transform: translateY(0) scale(1.2); opacity:0; }
}
</style>
</head>
<body>

<div class="card">
<h1>🎊 Congratulations!!! 🎊</h1>
<p id="message"></p>

<div class="slideshow">
    <img src="photo1.jpeg" class="active">
    <img src="photo2.jpeg">
    <img src="photo3.jpeg">
    <img src="photo4.jpeg">
</div>
</div>

<script>
/* Dynamic message */
const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "Shreya";
document.getElementById("message").innerText =
"Dear " + name + ", Congratulations on your first bonus! I'm really happy and proud of you. It's truly well deserved after all the hard work and dedication you've put in. Achievements like this show how much your efforts are paying off, and it makes me so glad to see you succeed. I just wish I could have been there to celebrate this moment with you. But we'll definitely celebrate together when we meet soon. This is just the beginning of many more successes ahead. Wishing you continued growth, happiness, and success ❤️";

/* Slideshow */
let slides = document.querySelectorAll(".slideshow img");
let index = 0;
setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 3000);

/* Confetti */
function createConfetti(count=120){
    for(let i=0;i<count;i++){
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random()*100+"vw";
        confetti.style.background = "hsl("+Math.random()*360+",100%,50%)";
        confetti.style.animationDuration = (Math.random()*3 + 2) + "s";
        document.body.appendChild(confetti);
    }
}

/* Floating hearts over viewport */
function createHearts(){
    setInterval(()=>{
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML="❤️";
        heart.style.left = Math.random()*100+"vw";
        heart.style.animationDuration = (Math.random()*3 + 4)+"s";
        document.body.appendChild(heart);
        setTimeout(()=>{ heart.remove(); }, 6000);
    }, 400);
}

createConfetti();
createHearts();
</script>

</body>
</html>
